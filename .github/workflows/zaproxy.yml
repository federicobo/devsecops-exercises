name: Site scanner

on:
  workflow_dispatch:

jobs:
  DAST-scan:
    name: DAST site scanner
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        port: [31546, 31547]

    steps:
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@bee4e5be916301228d2b1b2dcad73aab6fa6a25b # v0.13.0
        with:
          target: http://${{ secrets.CLUSTER_IP }}:${{ matrix.port}}
          artifact_name: zap_scan_${{ secrets.CLUSTER_IP }}_${{ matrix.port }}
